name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download Gradle wrapper jar
        run: curl -L https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
      - name: Build
        run: chmod +x gradlew && ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: donut-price-overlay
          path: build/libs/donut-price-overlay-2.0.0.jar
