plugins {
    id 'fabric-loom' version '1.3.10'
}
version = "2.0.0"
group = "com.donutpriceoverlay"
base { archivesName = "donut-price-overlay" }
repositories {
    maven { url "https://maven.fabricmc.net/" }
    mavenCentral()
}
dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.18.4"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.1+1.21.11"
}
tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}
